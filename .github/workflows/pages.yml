# Build and publish the sub-project sites to GitHub Pages:
#   /            -> Surveillance Radar (Next.js static export)
#   /replygraph/ -> ReplyGraph demo (self-contained static page)
#   /betterask/  -> BetterAsk download page (self-contained static page + zip)
name: Deploy project sites to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let in-progress runs finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: surveillance-radar/pnpm-lock.yaml

      - name: Build static export
        working-directory: surveillance-radar
        # Project pages are served from /<repo>/, so the app must be built with
        # that base path baked into asset and data URLs.
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          pnpm install --frozen-lockfile
          pnpm ingest:atlas
          pnpm build

      - name: Assemble multi-page site
        run: |
          rm -rf _site
          mkdir -p _site
          # Surveillance Radar at the site root
          cp -r surveillance-radar/out/. _site/
          # ReplyGraph self-contained demo at /replygraph/
          mkdir -p _site/replygraph
          cp index.html _site/replygraph/index.html
          # BetterAsk download page at /betterask/
          # Served from a subfolder, so rewrite the repo-root "back" link
          # (index.html, a sibling only in the repo) to the live site root.
          mkdir -p _site/betterask
          sed 's#href="index.html"#href="../"#' betterask.html > _site/betterask/index.html
          cp betterask-extension.zip _site/betterask/betterask-extension.zip

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

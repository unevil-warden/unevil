# Build and publish the unEvilGenius Labs portfolio to GitHub Pages:
#   /                -> Portfolio landing page (index.html)
#   /radar/          -> Surveillance Radar (Next.js static export)
#   /replygraph/     -> ReplyGraph demo (self-contained static page)
#   /jobagent/       -> JobAgent demo (self-contained static page)
#   /betterask/      -> BetterAsk download page + extension zip
#   /complaintgraph/ -> ComplaintGraph dashboard (static + freshly baked CFPB data)
#   /opensourcegraph/-> OpenSourceGraph dashboard (static + freshly baked OSS-health data)
name: Deploy project sites to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let in-progress runs finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: surveillance-radar/pnpm-lock.yaml

      - name: Build static export
        working-directory: surveillance-radar
        # The radar is served from /<repo>/radar/, so the app must be built with
        # that base path baked into asset and data URLs.
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/radar
        run: |
          pnpm install --frozen-lockfile
          pnpm ingest:atlas
          pnpm build

      - name: Refresh ComplaintGraph data from CFPB
        # Pull a live snapshot of the public CFPB Consumer Complaint Database.
        # If the fetch fails, is slow, or hangs, the committed sample dataset is
        # kept so the page always renders (clearly labeled as sample). The step
        # is bounded three ways: per-request timeout + total budget in the
        # script, plus this hard step timeout as a final backstop.
        working-directory: complaintgraph
        continue-on-error: true
        timeout-minutes: 6
        run: node scripts/ingest-cfpb.mjs

      - name: Refresh OpenSourceGraph data from open-source APIs
        # Pull live open-source health signals (deps.dev / OSV / ecosyste.ms /
        # GitHub). Like the CFPB step, this is best-effort: the ingest only
        # overwrites when it gathers enough live data, otherwise the committed
        # sample dataset is kept so the page always renders (clearly labeled as
        # sample). Bounded by per-request timeouts + a budget in the script,
        # plus this hard step timeout as a final backstop. GITHUB_TOKEN (the
        # built-in Actions token) raises the GitHub API rate limit.
        working-directory: opensourcegraph
        continue-on-error: true
        timeout-minutes: 6
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/ingest.mjs

      - name: Assemble multi-page site
        run: |
          rm -rf _site
          mkdir -p _site
          # Portfolio landing page at the site root
          cp index.html _site/index.html
          # Surveillance Radar at /radar/
          mkdir -p _site/radar
          cp -r surveillance-radar/out/. _site/radar/
          # ReplyGraph self-contained demo at /replygraph/
          mkdir -p _site/replygraph
          cp replygraph/demo/index.html _site/replygraph/index.html
          # JobAgent self-contained demo at /jobagent/
          mkdir -p _site/jobagent
          cp jobagent/demo/index.html _site/jobagent/index.html
          # BetterAsk download page + extension zip at /betterask/
          mkdir -p _site/betterask
          cp betterask.html _site/betterask/index.html
          cp betterask-extension.zip _site/betterask/betterask-extension.zip
          # ComplaintGraph dashboard + baked data at /complaintgraph/
          mkdir -p _site/complaintgraph
          cp -r complaintgraph/src/. _site/complaintgraph/
          cp -r complaintgraph/data _site/complaintgraph/data
          # OpenSourceGraph dashboard + baked data at /opensourcegraph/
          mkdir -p _site/opensourcegraph
          cp -r opensourcegraph/src/. _site/opensourcegraph/
          cp -r opensourcegraph/data _site/opensourcegraph/data
          # Sub-path aliases for the self-contained demos, so links that mirror
          # the repo's own folder layout (e.g. /replygraph/demo/, /jobagent/demo/,
          # /betterask.html) resolve to the same page as the clean paths above.
          # Only done for single-file pages where it can't break relative asset
          # or data paths; ComplaintGraph/OpenSourceGraph stay at their clean
          # paths since their data is loaded relative to the page.
          mkdir -p _site/replygraph/demo && cp _site/replygraph/index.html _site/replygraph/demo/index.html
          mkdir -p _site/jobagent/demo && cp _site/jobagent/index.html _site/jobagent/demo/index.html
          cp betterask.html _site/betterask.html

      - name: Setup Pages
        # enablement: true makes this action create/enable the Pages site (with
        # GitHub Actions as the source) if it isn't already, instead of 404ing
        # when no Pages site exists yet. Requires the pages: write permission set above.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

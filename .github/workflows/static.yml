# Deploy the existing static homepage AND the Surveillance Radar app to GitHub Pages.
# The homepage stays at the site root; the Next.js app is built and served at /surveillance-radar/.
name: Deploy to Pages

on:
  push:
    branches: ["main", "claude/thoughts-on-this-kurwxc"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: surveillance-radar/pnpm-lock.yaml

      - name: Build Surveillance Radar (static export)
        working-directory: surveillance-radar
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/surveillance-radar
        run: |
          pnpm install --frozen-lockfile
          pnpm ingest:atlas
          pnpm build

      - name: Assemble site (homepage + app subpath)
        run: |
          mkdir -p _site
          rsync -a --exclude surveillance-radar --exclude .git --exclude _site --exclude .github ./ _site/
          mkdir -p _site/surveillance-radar
          cp -r surveillance-radar/out/. _site/surveillance-radar/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

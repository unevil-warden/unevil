# CI for the BetterAsk extension: type-check, build, and the headless-Chromium
# end-to-end smoke test. Runs on PRs and pushes that touch betterask/.
name: BetterAsk CI

on:
  push:
    branches: ["main"]
    paths:
      - "betterask/**"
      - ".github/workflows/betterask-ci.yml"
  pull_request:
    paths:
      - "betterask/**"
      - ".github/workflows/betterask-ci.yml"

permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: betterask-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Install Playwright browsers to a known path so the smoke test's findChromium()
    # resolves the FULL Chrome build here. Without this, Playwright defaults to
    # chrome-headless-shell, which can't load MV3 extensions, so the extension's
    # service worker never registers and the test times out.
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
    defaults:
      run:
        working-directory: betterask
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: betterask/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Smoke test (headless Chromium E2E)
        run: npm run test:smoke

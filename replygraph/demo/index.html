<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReplyGraph — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --ink: #0a0a0a;
    --muted: #6b6b6b;
    --faint: #9a9a9a;
    --line: #e6e6e6;
    --line-strong: #0a0a0a;
    --pop: #2348ff;
    --pop-tint: #eef1ff;
    --panel: #fafafa;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .side { width: 232px; min-width: 232px; border-right: 1px solid var(--line); display: flex; flex-direction: column; padding: 28px 18px; }
  .brand { display: flex; align-items: center; gap: 9px; padding: 0 6px 28px; }
  .brand .dot { width: 11px; height: 11px; background: var(--pop); border-radius: 50%; }
  .brand h1 { font-size: 15px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; }
  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav button {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 10px 12px; border: none; background: none;
    font-family: var(--font); font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--faint); cursor: pointer; text-align: left;
    border-radius: 7px; transition: color .12s, background .12s;
  }
  .nav button:hover { color: var(--ink); }
  .nav button.active { color: var(--ink); background: var(--panel); }
  .nav button.active .tick { width: 6px; height: 6px; background: var(--pop); border-radius: 50%; }
  .nav .tick { width: 6px; height: 6px; background: transparent; border-radius: 50%; }
  .side-foot { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--line); }
  .status { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); margin-bottom: 12px; }
  .status .ring { width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid var(--ink); }
  .sync {
    width: 100%; padding: 9px; border: 1px solid var(--line-strong); background: var(--ink); color: #fff;
    font-family: var(--font); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border-radius: 7px;
  }
  .sync:hover { background: #222; }

  /* Main */
  .main { flex: 1; overflow-y: auto; }
  .wrap { max-width: 1180px; padding: 40px 48px; }
  .head { margin-bottom: 34px; }
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--pop); margin-bottom: 10px; }
  .head h2 { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; }
  .head p { color: var(--muted); margin-top: 8px; font-size: 13px; }

  /* Generic */
  .row { display: flex; }
  .between { justify-content: space-between; align-items: flex-start; }
  .muted { color: var(--muted); }
  .faint { color: var(--faint); }
  .sm { font-size: 12px; }
  .xs { font-size: 11px; }
  hr { border: none; border-top: 1px solid var(--line); margin: 28px 0; }
  .rule-strong { border-top: 1.5px solid var(--ink); }

  /* Stat / widget grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(232px, 1fr)); gap: 1px; background: var(--line); border: 1px solid var(--line); }
  .cell { background: var(--bg); padding: 22px; }
  .cell .label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .cell .num { font-size: 46px; font-weight: 800; letter-spacing: -0.03em; margin-top: 10px; line-height: 1; }
  .cell .num.pop { color: var(--pop); }
  .cell .sub { margin-top: 14px; display: flex; flex-direction: column; gap: 7px; }
  .cell .sub div { font-size: 12px; color: var(--muted); border-top: 1px solid var(--line); padding-top: 7px; }
  .cell .sub div b { color: var(--ink); font-weight: 600; }

  /* Tags */
  .tag { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border: 1px solid var(--ink); border-radius: 100px; }
  .tag.solid { background: var(--ink); color: #fff; }
  .tag.pop { border-color: var(--pop); color: var(--pop); }
  .tag.ghost { border-color: var(--line); color: var(--faint); }

  /* Inbox */
  .inbox { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
  .threads { border-right: 1px solid var(--line); overflow-y: auto; }
  .threads-head { padding: 26px 24px 16px; position: sticky; top: 0; background: var(--bg); }
  .threads-head .eyebrow { margin-bottom: 6px; }
  .threads-head h3 { font-size: 20px; font-weight: 800; }
  .filters { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
  .chip { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 10px; border: 1px solid var(--line); background: none; border-radius: 100px; cursor: pointer; color: var(--muted); font-family: var(--font); }
  .chip.on { border-color: var(--ink); color: var(--ink); }
  .thread { padding: 16px 24px; border-bottom: 1px solid var(--line); cursor: pointer; border-left: 2px solid transparent; }
  .thread:hover { background: var(--panel); }
  .thread.active { border-left: 2px solid var(--pop); background: var(--panel); }
  .thread .t-top { display: flex; justify-content: space-between; align-items: baseline; }
  .thread .name { font-weight: 700; font-size: 13px; }
  .thread .when { font-size: 10px; color: var(--faint); letter-spacing: 0.04em; }
  .thread .prev { font-size: 12px; color: var(--muted); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .thread .t-meta { display: flex; gap: 6px; margin-top: 9px; flex-wrap: wrap; }

  .detail { overflow-y: auto; padding: 34px 40px; }
  .convo { display: flex; flex-direction: column; gap: 8px; margin: 22px 0; max-height: 320px; overflow-y: auto; padding-right: 6px; }
  .msg { max-width: 74%; }
  .msg.me { align-self: flex-end; }
  .msg.them { align-self: flex-start; }
  .bubble { padding: 10px 14px; font-size: 13px; line-height: 1.45; border-radius: 14px; }
  .me .bubble { background: var(--ink); color: #fff; border-bottom-right-radius: 4px; }
  .them .bubble { background: var(--panel); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .msg .time { font-size: 9.5px; color: var(--faint); margin-top: 3px; }
  .me .time { text-align: right; }

  .draft-card { border: 1.5px solid var(--ink); border-radius: 12px; padding: 18px; }
  .draft-card textarea { width: 100%; border: none; outline: none; resize: vertical; min-height: 78px; font-family: var(--font); font-size: 15px; line-height: 1.6; color: var(--ink); background: none; }
  .reason { font-size: 12px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .rw-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); margin: 18px 0 8px; }
  .rewrites { display: flex; flex-wrap: wrap; gap: 6px; }
  .rw { font-size: 11px; padding: 5px 11px; border: 1px solid var(--line); background: none; border-radius: 100px; cursor: pointer; color: var(--muted); font-family: var(--font); }
  .rw:hover { border-color: var(--pop); color: var(--pop); }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
  .btn { font-family: var(--font); font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 16px; border-radius: 8px; cursor: pointer; border: 1px solid var(--ink); background: none; color: var(--ink); }
  .btn:hover { background: var(--panel); }
  .btn.primary { background: var(--pop); border-color: var(--pop); color: #fff; }
  .btn.primary:hover { background: #1838d8; }
  .btn.solid { background: var(--ink); color: #fff; }
  .btn.solid:hover { background: #222; }

  .flags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
  .notice { border: 1px solid var(--ink); border-left: 3px solid var(--pop); padding: 11px 14px; font-size: 12px; margin-top: 14px; border-radius: 6px; }

  /* Follow-ups */
  .fu { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--line); }
  .fu .task { font-weight: 600; font-size: 13px; }
  .fu .fu-meta { display: flex; gap: 12px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
  .dir { font-size: 9.5px; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; padding: 3px 7px; border-radius: 4px; border: 1px solid var(--ink); }

  /* Analytics */
  .acard { border: 1px solid var(--line); border-radius: 10px; padding: 20px; margin-bottom: 14px; }
  .acard .a-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); }
  .stat .k { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); }
  .stat .v { font-weight: 700; font-size: 14px; margin-top: 4px; }
  .conf { font-size: 10px; color: var(--faint); font-style: italic; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); padding: 0 14px 10px 0; }
  td { padding: 12px 14px 12px 0; border-top: 1px solid var(--line); }

  /* Settings */
  .ssection { margin-bottom: 36px; }
  .sec-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); margin-bottom: 14px; }
  .srow { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--line); gap: 24px; }
  .srow .s-label { font-weight: 600; font-size: 13px; }
  .srow .s-desc { font-size: 11px; color: var(--muted); margin-top: 3px; max-width: 440px; }
  .sinput { border: 1px solid var(--line); border-radius: 7px; padding: 8px 11px; font-family: var(--font); font-size: 13px; width: 280px; outline: none; }
  .sinput:focus { border-color: var(--pop); }
  .tog { width: 42px; height: 24px; border: 1.5px solid var(--ink); border-radius: 100px; position: relative; cursor: pointer; flex-shrink: 0; }
  .tog::after { content: ''; position: absolute; width: 16px; height: 16px; background: var(--ink); border-radius: 50%; top: 2px; left: 2px; transition: .15s; }
  .tog.on { background: var(--pop); border-color: var(--pop); }
  .tog.on::after { background: #fff; left: 20px; }

  /* Toast */
  .toasts { position: fixed; bottom: 26px; right: 26px; display: flex; flex-direction: column; gap: 8px; z-index: 50; }
  .toast { background: var(--ink); color: #fff; padding: 12px 18px; border-radius: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.03em; animation: pop .18s ease; }
  @keyframes pop { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .demo-banner { background: var(--ink); color: #fff; text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px; }
  .demo-banner b { color: var(--pop); background: #fff; padding: 1px 6px; border-radius: 3px; margin-right: 6px; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--faint); }
  .empty { color: var(--faint); padding: 60px 0; text-align: center; font-size: 13px; }
</style>
</head>
<body>
<div class="demo-banner"><b>DEMO</b> Sample data only · the real app reads your iMessages locally on your Mac</div>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="dot"></span><h1>ReplyGraph</h1></div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <div class="status"><span class="ring"></span> Demo mode — not connected</div>
      <button class="sync" onclick="toast('Sync is disabled in the demo')">Sync Messages</button>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>
<div class="toasts" id="toasts"></div>

<script>
// ---------- Sample data ----------
const NOW = new Date('2026-06-28T18:30:00');
function ago(mins){ return new Date(NOW.getTime() - mins*60000); }
function tfmt(d){ return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }

const THREADS = [
  { id:1, name:'Sarah Chen', priority:'urgent', urgency:'high', needs:true, tone:'tense', trend:'declining', conf:'high', risk:[],
    last:'so are we still on for friday or not? you keep leaving me on read',
    msgs:[
      {me:false,t:'hey did you get my message about friday?',at:ago(2880)},
      {me:false,t:'just need to know if dinner is happening',at:ago(1440)},
      {me:false,t:'so are we still on for friday or not? you keep leaving me on read',at:ago(180)},
    ],
    draft:{text:"you're right, sorry for the silence — friday works, 8pm at the usual place?",reason:'Repeated unanswered messages; some friction. Keep it short and own the delay once.',risk:[],conf:'medium'},
    fu:[{task:'confirm friday dinner 8pm',dir:'user_owes_them',due:'friday',conf:'high'}] },
  { id:2, name:'Dr. Patel office', priority:'risky_to_answer_fast', urgency:'high', needs:true, tone:'logistical', trend:'stable', conf:'medium', risk:['medical'],
    last:'Please confirm your appointment and whether you want the lab results sent over.',
    msgs:[
      {me:false,t:'Reminder: follow-up appointment Tue 10:00am.',at:ago(4320)},
      {me:false,t:'Please confirm your appointment and whether you want the lab results sent over.',at:ago(600)},
    ],
    draft:{text:"Hi — confirming Tuesday 10am works. Yes, please send the lab results. Thank you.",reason:'Medical topic flagged — review carefully before copying. Kept factual.',risk:['medical'],conf:'medium'},
    fu:[{task:'confirm appt tue 10am',dir:'user_owes_them',due:'tuesday',conf:'high'},{task:'decide on lab results',dir:'unanswered_question',due:null,conf:'medium'}] },
  { id:3, name:'Mom', priority:'emotional', urgency:'medium', needs:true, tone:'warm', trend:'stable', conf:'high', risk:[],
    last:'miss you sweetheart, call me when you get a chance ❤️',
    msgs:[
      {me:false,t:'how did the presentation go??',at:ago(2000)},
      {me:true,t:'went well! tell you about it soon',at:ago(1900)},
      {me:false,t:'miss you sweetheart, call me when you get a chance ❤️',at:ago(300)},
    ],
    draft:{text:"miss you too — i'll call tonight after work, promise. love you",reason:'Warm family thread. Simple and caring; gives a concrete time.',risk:[],conf:'high'},
    fu:[{task:'call mom tonight',dir:'user_owes_them',due:'tonight',conf:'high'}] },
  { id:4, name:'Marcus (work)', priority:'work_admin', urgency:'medium', needs:true, tone:'logistical', trend:'stable', conf:'medium', risk:['work_risk'],
    last:'can you send the revised budget before the client call tomorrow?',
    msgs:[
      {me:false,t:'great work on the deck',at:ago(800)},
      {me:false,t:'can you send the revised budget before the client call tomorrow?',at:ago(120)},
    ],
    draft:{text:"Will do — I'll have the revised budget to you by EOD today.",reason:'Work request with a deadline. Direct, commits to a clear time.',risk:['work_risk'],conf:'medium'},
    fu:[{task:'send revised budget before client call',dir:'user_owes_them',due:'tomorrow',conf:'high'}] },
  { id:5, name:'Jules', priority:'logistical', urgency:'medium', needs:true, tone:'playful', trend:'stable', conf:'medium', risk:[],
    last:'are you free this weekend? thinking we could do that hike finally lol',
    msgs:[
      {me:false,t:'are you free this weekend? thinking we could do that hike finally lol',at:ago(420)},
    ],
    draft:{text:"haha yes let's actually do it — saturday morning? i can drive",reason:'Casual scheduling. Matches the light tone, proposes a concrete time.',risk:[],conf:'medium'},
    fu:[{task:'plan weekend hike',dir:'scheduling_loop',due:'this weekend',conf:'medium'}] },
  { id:6, name:'Alex', priority:'low_priority', urgency:'low', needs:false, tone:'neutral', trend:'stable', conf:'low', risk:[],
    last:'sounds good, talk soon!',
    msgs:[
      {me:false,t:'thanks for the recommendation',at:ago(6000)},
      {me:true,t:'anytime!',at:ago(5990)},
      {me:false,t:'sounds good, talk soon!',at:ago(5980)},
    ],
    draft:{text:"No reply needed here — the thread looks wrapped up.",reason:'Last message was a sign-off; nothing outstanding.',risk:[],conf:'medium'},
    fu:[] },
];

const ANALYTICS = [
  { name:'Sarah Chen', tone:'tense', trend:'declining', conf:'high', vol:42, last:'Jun 28', resp:'~6h', waitThem:false, waitYou:true, topics:['plans','food'], loops:['so are we still on for friday or not?'] },
  { name:'Mom', tone:'warm', trend:'stable', conf:'high', vol:128, last:'Jun 28', resp:'~2h', waitThem:false, waitYou:true, topics:['family','health'], loops:['call me when you get a chance'] },
  { name:'Marcus (work)', tone:'logistical', trend:'stable', conf:'medium', vol:67, last:'Jun 28', resp:'~1h', waitThem:false, waitYou:true, topics:['work','money'], loops:['send the revised budget?'] },
  { name:'Jules', tone:'playful', trend:'stable', conf:'medium', vol:23, last:'Jun 28', resp:'~4h', waitThem:false, waitYou:true, topics:['plans'], loops:[] },
];

const TOKENS = [
  { op:'draft_generation', n:14, inp:18400, out:2800, cost:0.0259 },
  { op:'rewrite', n:9, inp:6200, out:1350, cost:0.0104 },
  { op:'relationship_analytics', n:4, inp:9100, out:1600, cost:0.0137 },
  { op:'followup_extraction', n:6, inp:4300, out:900, cost:0.0070 },
];

const DIR_LABEL = { user_owes_them:'I owe them', they_owe_user:'They owe me', scheduling_loop:'Scheduling', unanswered_question:'Open question' };

// ---------- State ----------
let state = { tab:'dashboard', thread:1, filter:'needs', drafts:{}, completed:new Set() };
THREADS.forEach(t => state.drafts[t.id] = t.draft.text);

const TABS = [
  ['dashboard','Dashboard'], ['inbox','Inbox'], ['followups','Follow-ups'],
  ['analytics','Analytics'], ['exports','Exports'], ['settings','Settings'],
];

// ---------- Render ----------
function renderNav(){
  document.getElementById('nav').innerHTML = TABS.map(([id,label]) =>
    `<button class="${state.tab===id?'active':''}" onclick="go('${id}')">
       <span>${label}</span><span class="tick"></span>
     </button>`).join('');
}
function go(tab){ state.tab = tab; renderNav(); renderMain(); document.getElementById('main').scrollTop = 0; }

function renderMain(){
  const m = document.getElementById('main');
  if(state.tab==='dashboard') m.innerHTML = viewDashboard();
  else if(state.tab==='inbox') m.innerHTML = viewInbox();
  else if(state.tab==='followups') m.innerHTML = viewFollowups();
  else if(state.tab==='analytics') m.innerHTML = viewAnalytics();
  else if(state.tab==='exports') m.innerHTML = viewExports();
  else if(state.tab==='settings') m.innerHTML = viewSettings();
}

function allFollowups(){
  const out = [];
  THREADS.forEach(t => t.fu.forEach((f,i) => out.push({...f, key:t.id+'-'+i, who:t.name})));
  return out.filter(f => !state.completed.has(f.key));
}

function viewDashboard(){
  const needs = THREADS.filter(t=>t.needs);
  const risk = THREADS.filter(t=>t.priority==='risky_to_answer_fast' || t.risk.length);
  const emo = THREADS.filter(t=>t.priority==='emotional');
  const fu = allFollowups();
  return `<div class="wrap">
    <div class="head">
      <div class="eyebrow">Overview</div>
      <h2>Dashboard</h2>
      <p>${needs.length} threads need a reply · ${fu.length} open follow-ups · ${risk.length} flagged to review</p>
    </div>
    <div class="grid">
      <div class="cell"><div class="label">Needs Reply</div><div class="num pop">${needs.length}</div>
        <div class="sub">${needs.slice(0,3).map(t=>`<div><b>${t.name}</b> — ${t.last.slice(0,38)}…</div>`).join('')}</div></div>
      <div class="cell"><div class="label">Flagged / Review</div><div class="num">${risk.length}</div>
        <div class="sub">${risk.map(t=>`<div><b>${t.name}</b> — ${t.risk[0]||'review carefully'}</div>`).join('')}</div></div>
      <div class="cell"><div class="label">Open Follow-ups</div><div class="num">${fu.length}</div>
        <div class="sub">${fu.slice(0,3).map(f=>`<div><b>${DIR_LABEL[f.dir]}</b> — ${f.task}</div>`).join('')}</div></div>
      <div class="cell"><div class="label">Emotional</div><div class="num">${emo.length}</div>
        <div class="sub">${emo.map(t=>`<div><b>${t.name}</b></div>`).join('')||'<div>None right now</div>'}</div></div>
      <div class="cell"><div class="label">Waiting On Me</div><div class="num">${needs.length}</div>
        <div class="sub"><div>People expecting a reply from you</div></div></div>
      <div class="cell"><div class="label">iMessage Sync</div><div class="num" style="font-size:18px;font-weight:700;margin-top:14px">Demo mode</div>
        <div class="sub"><div>Connects to chat.db on your Mac</div></div></div>
    </div>
  </div>`;
}

function viewInbox(){
  let list = THREADS;
  if(state.filter==='needs') list = THREADS.filter(t=>t.needs);
  else if(state.filter==='risk') list = THREADS.filter(t=>t.priority==='risky_to_answer_fast'||t.risk.length);
  const t = THREADS.find(x=>x.id===state.thread) || THREADS[0];
  const filt = (id,label) => `<button class="chip ${state.filter===id?'on':''}" onclick="setFilter('${id}')">${label}</button>`;

  const threadList = list.map(x=>`
    <div class="thread ${x.id===state.thread?'active':''}" onclick="pick(${x.id})">
      <div class="t-top"><span class="name">${x.name}</span><span class="when">${tfmt(x.msgs[x.msgs.length-1].at)}</span></div>
      <div class="prev">${x.last}</div>
      <div class="t-meta">
        ${x.priority==='urgent'?'<span class="tag solid">Urgent</span>':''}
        ${x.risk.length?`<span class="tag">${x.risk[0]}</span>`:''}
        ${x.needs?'<span class="tag pop">Reply</span>':'<span class="tag ghost">Caught up</span>'}
      </div>
    </div>`).join('');

  const highRisk = t.risk.some(f=>['medical','money','legal','conflict','work_risk'].includes(f));
  const dtext = state.drafts[t.id];

  const detail = `
    <div class="row between">
      <div>
        <div class="eyebrow">${t.priority.replace(/_/g,' ')}</div>
        <h2 style="font-size:24px;font-weight:800">${t.name}</h2>
        <div class="t-meta" style="margin-top:8px">
          <span class="tag">${t.tone} · ${t.conf} conf</span>
          ${t.risk.map(f=>`<span class="tag">${f}</span>`).join('')}
        </div>
      </div>
      <button class="btn" onclick="toast('Marked: no reply needed')">No reply needed</button>
    </div>
    <div class="convo">
      ${t.msgs.map(mm=>`<div class="msg ${mm.me?'me':'them'}"><div class="bubble">${mm.t}</div><div class="time">${tfmt(mm.at)}</div></div>`).join('')}
    </div>
    <hr class="rule-strong"/>
    <div class="rw-label" style="margin-top:0">Draft reply</div>
    <div class="reason">${t.draft.reason}<span class="tag ghost">${t.draft.conf} conf</span></div>
    <div class="draft-card">
      <textarea id="draft" oninput="state.drafts[${t.id}]=this.value">${dtext}</textarea>
    </div>
    ${highRisk?`<div class="notice"><b>Review carefully</b> — this thread touches a sensitive topic (${t.risk.join(', ')}). Copy-to-clipboard only; nothing is ever sent for you.</div>`:''}
    ${t.draft.risk.length?`<div class="flags">${t.draft.risk.map(f=>`<span class="tag">${f}</span>`).join('')}</div>`:''}
    <div class="rw-label">Rewrite</div>
    <div class="rewrites">
      ${['shorter','nicer','more direct','less fake','more adult','casual','professional','say no politely','buy time','one clear question','calmer','less defensive','less apologetic'].map(r=>`<button class="rw" onclick="rewrite(${t.id},'${r}')">${r}</button>`).join('')}
    </div>
    <div class="actions">
      <button class="btn solid" onclick="toast('Approved & saved to decisions')">✓ Approve</button>
      <button class="btn" onclick="toast('Edited draft saved')">✎ Save edit</button>
      <button class="btn primary" onclick="copyDraft(${t.id})">⧉ Copy to clipboard</button>
      <button class="btn" onclick="toast('Denied — noted for style learning')">✕ Deny</button>
    </div>`;

  return `<div class="inbox">
    <div class="threads">
      <div class="threads-head">
        <div class="eyebrow">Inbox</div><h3>Threads</h3>
        <div class="filters">${filt('needs','Needs reply')}${filt('all','All')}${filt('risk','Flagged')}</div>
      </div>
      ${threadList}
    </div>
    <div class="detail">${detail}</div>
  </div>`;
}

function viewFollowups(){
  const fu = allFollowups();
  const groups = {};
  fu.forEach(f=>{ (groups[f.dir]=groups[f.dir]||[]).push(f); });
  const body = Object.keys(groups).length ? Object.entries(groups).map(([dir,items])=>`
    <div class="sec-title" style="margin-top:26px">${DIR_LABEL[dir]||dir}</div>
    ${items.map(f=>`<div class="fu">
      <div>
        <div class="task">${f.task}</div>
        <div class="fu-meta"><span class="dir">${DIR_LABEL[f.dir]}</span><span class="sm muted">${f.who}</span>${f.due?`<span class="sm" style="color:var(--pop)">Due: ${f.due}</span>`:''}<span class="conf">${f.conf} conf</span></div>
      </div>
      <button class="btn" onclick="complete('${f.key}')">Done</button>
    </div>`).join('')}`).join('') : '<div class="empty">No open follow-ups 🎉</div>';
  return `<div class="wrap">
    <div class="head"><div class="eyebrow">Tasks</div><h2>Follow-ups</h2><p>${fu.length} open items pulled from your conversations</p></div>
    ${body}
  </div>`;
}

function viewAnalytics(){
  const cards = ANALYTICS.map(a=>`
    <div class="acard">
      <div class="a-top">
        <div>
          <div style="font-weight:800;font-size:15px">${a.name}</div>
          <div class="t-meta" style="margin-top:7px">
            <span class="tag">${a.tone}</span>
            <span class="sm muted">${a.trend==='declining'?'↓ higher-friction lately':a.trend==='improving'?'↑ warming up':'→ stable'}</span>
            <span class="conf">${a.conf} conf</span>
          </div>
        </div>
        <div class="sm muted" style="text-align:right">${a.vol} messages<br/>${a.last}</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="k">Avg response</div><div class="v">${a.resp}</div></div>
        <div class="stat"><div class="k">You're waiting</div><div class="v">${a.waitYou?'Yes':'No'}</div></div>
        <div class="stat"><div class="k">Topics</div><div class="v" style="font-size:12px">${a.topics.join(', ')}</div></div>
        ${a.loops.length?`<div class="stat"><div class="k">Open loop</div><div class="v" style="font-size:12px;color:var(--pop)">${a.loops[0].slice(0,40)}…</div></div>`:''}
      </div>
    </div>`).join('');
  const tokenRows = TOKENS.map(r=>`<tr><td>${r.op}</td><td class="muted">${r.n}</td><td class="muted">${r.inp.toLocaleString()}</td><td class="muted">${r.out.toLocaleString()}</td><td style="color:var(--pop);font-weight:700">$${r.cost.toFixed(4)}</td></tr>`).join('');
  return `<div class="wrap">
    <div class="head"><div class="eyebrow">Estimates</div><h2>Analytics</h2><p>Heuristic estimates from text patterns — not facts, not psychology. Confidence shows how much data was available.</p></div>
    <div class="notice" style="margin-bottom:24px">These are <b>estimates</b>. Low confidence means take it lightly. ReplyGraph describes threads ("higher-friction lately"), it does not judge people.</div>
    ${cards}
    <div class="sec-title" style="margin-top:34px">Token Usage Estimate</div>
    <table><thead><tr><th>Operation</th><th>Runs</th><th>Input</th><th>Output</th><th>Est. cost</th></tr></thead><tbody>${tokenRows}</tbody></table>
    <p class="sm muted" style="margin-top:12px">Prices come from your editable settings and may not match real billing.</p>
  </div>`;
}

function viewExports(){
  return `<div class="wrap">
    <div class="head"><div class="eyebrow">Output</div><h2>Exports</h2><p>Summaries only by default — never raw message dumps. User-triggered, timestamped, with confidence labels.</p></div>
    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">
      <div class="cell"><div class="label">Markdown</div><p class="sm muted" style="margin:12px 0 18px">Daily digest, follow-ups, and analytics as local .md files.</p><button class="btn solid" onclick="toast('Wrote 3 markdown files (demo)')">Export Markdown</button></div>
      <div class="cell"><div class="label">Obsidian</div><p class="sm muted" style="margin:12px 0 18px">Writes into /ReplyGraph/ with YAML frontmatter and [[wiki links]].</p><button class="btn solid" onclick="toast('Set a vault path in Settings (demo)')">Export to Obsidian</button></div>
    </div>
    <div class="sec-title" style="margin-top:34px">Recent exports</div>
    <div class="fu"><div><span class="tag ghost">daily_digest</span> <span class="sm muted">~/ReplyGraph/daily_digest_2026-06-28.md</span></div><span class="sm faint">just now</span></div>
    <div class="fu"><div><span class="tag ghost">followups</span> <span class="sm muted">~/ReplyGraph/followups_2026-06-28.md</span></div><span class="sm faint">just now</span></div>
  </div>`;
}

let toggles = { local:true, llm:false };
function viewSettings(){
  return `<div class="wrap">
    <div class="head"><div class="eyebrow">Configuration</div><h2>Settings</h2><p>All local. Nothing leaves your machine unless you add an API key and turn local-only mode off.</p></div>

    <div class="section"><div class="sec-title">iMessage</div>
      <div class="srow"><div><div class="s-label">Database status</div><div class="s-desc">Reads ~/Library/Messages/chat.db (read-only). Needs Full Disk Access for Terminal on macOS.</div></div><span class="tag">Demo — not connected</span></div>
      <div class="srow"><div><div class="s-label">Max threads</div><div class="s-desc">How many recent conversations to pull per sync.</div></div><input class="sinput" value="50" style="width:90px"/></div>
      <div class="srow"><div><div class="s-label">Max messages / thread</div><div class="s-desc">How far back to read in each conversation.</div></div><input class="sinput" value="50" style="width:90px"/></div>
    </div>

    <div class="section"><div class="sec-title">Privacy & LLM</div>
      <div class="srow"><div><div class="s-label">Local-only mode</div><div class="s-desc">When on, drafts use offline heuristics and no message text is ever sent anywhere.</div></div><div class="tog ${toggles.local?'on':''}" onclick="flip('local')"></div></div>
      <div class="srow"><div><div class="s-label">Use LLM drafts</div><div class="s-desc">Optional. Sends the conversation to Claude to write better drafts. Off by default.</div></div><div class="tog ${toggles.llm?'on':''}" onclick="flip('llm')"></div></div>
      <div class="srow"><div><div class="s-label">API key</div><div class="s-desc">Stored locally. Only used if LLM drafts are on.</div></div><input class="sinput" type="password" placeholder="sk-ant-…"/></div>
      <div class="srow"><div><div class="s-label">Model</div><div class="s-desc">Stronger models for risky rewrites, cheaper ones for routine drafts.</div></div><input class="sinput" value="claude-haiku-4-5" style="width:200px"/></div>
    </div>

    <div class="section"><div class="sec-title">Export</div>
      <div class="srow"><div><div class="s-label">Obsidian vault path</div><div class="s-desc">Where /ReplyGraph/ notes get written.</div></div><input class="sinput" placeholder="~/Documents/MyVault"/></div>
    </div>

    <div class="section"><div class="sec-title">Data</div>
      <div class="srow"><div><div class="s-label">Rebuild analytics</div><div class="s-desc">Recompute tone & relationship estimates from stored messages.</div></div><button class="btn" onclick="toast('Rebuilt (demo)')">Rebuild</button></div>
      <div class="srow"><div><div class="s-label">Clear local database</div><div class="s-desc">Deletes all synced messages and analysis from this machine.</div></div><button class="btn" onclick="toast('Demo: nothing was deleted')">Clear</button></div>
    </div>
  </div>`;
}

// ---------- Actions ----------
function pick(id){ state.thread=id; renderMain(); }
function setFilter(f){ state.filter=f; renderMain(); }
function flip(k){ toggles[k]=!toggles[k]; renderMain(); }
function complete(key){ state.completed.add(key); renderMain(); toast('Marked complete'); }

function rewrite(id, type){
  let t = state.drafts[id]; const words = t.split(/\s+/);
  if(type==='shorter') t = words.slice(0, Math.max(4, Math.ceil(words.length/2))).join(' ');
  else if(type==='casual') t = t.toLowerCase().replace(/[.!]+$/,'') + ' :)';
  else if(type==='professional') t = t.charAt(0).toUpperCase()+t.slice(1).replace(/\s*:\)$/,'').replace(/[!]+/,'') ;
  else if(type==='less apologetic') t = t.replace(/\b(sorry|i apologize|my bad|my fault)[,]?\s*/gi,'').replace(/^./,c=>c.toUpperCase());
  else if(type==='calmer') t = t.replace(/\b(ridiculous|insane|unacceptable|crazy)\b/gi,'frustrating');
  else if(type==='say no politely') t = "Thanks for thinking of me — I can't make this one work, but I appreciate the ask.";
  else if(type==='buy time') t = "Thanks for this — I need a little time to think it through. I'll get back to you shortly.";
  else if(type==='one clear question') t = t.replace(/[?.!]+$/,'') + '. What works best for you?';
  else if(type==='nicer') t = t.replace(/^./,c=>c.toUpperCase()) + ' 🙂';
  else if(type==='more direct') t = t.replace(/^(hey|hi|so|well|um|i think|maybe)[, ]+/i,'').replace(/^./,c=>c.toUpperCase());
  else if(type==='less fake') t = t.replace(/!+/g,'').replace(/\bso (excited|happy|thrilled)\b/gi,'glad');
  else if(type==='more adult') t = t.replace(/\blol\b/gi,'').replace(/\bhaha\b/gi,'').trim().replace(/^./,c=>c.toUpperCase());
  else if(type==='less defensive') t = t.replace(/\b(i was just|i didn'?t mean|for the record|to be clear)\b[, ]*/gi,'').replace(/^./,c=>c.toUpperCase());
  state.drafts[id]=t.trim(); renderMain(); toast('Rewritten: '+type);
}

function copyDraft(id){
  const text = state.drafts[id];
  if(navigator.clipboard){ navigator.clipboard.writeText(text).then(()=>toast('Copied to clipboard')).catch(()=>toast('Copied (demo)')); }
  else toast('Copied (demo)');
}

let toastTimer;
function toast(msg){
  const c = document.getElementById('toasts');
  const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
  c.appendChild(el); setTimeout(()=>el.remove(), 2600);
}

// ---------- Boot ----------
renderNav(); renderMain();
</script>
